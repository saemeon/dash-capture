[project]
name = "dash-interact"
version = "0.1.0"
description = "pyplot-style convenience layer for Plotly Dash — build interactive apps top-to-bottom with no boilerplate."
keywords = ["plotly", "dash", "visualization", "dashboard", "interact"]
classifiers = [
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Operating System :: OS Independent",
]
readme = "README.md"
license = "MIT"
authors = [
    { name = "Simon Niederberger", email = "s.niederberger@hotmail.com" },
]
maintainers = [
    { name = "Simon Niederberger", email = "s.niederberger@hotmail.com" },
]
requires-python = ">=3.10"
dependencies = [
    "dash-fn-interact",
]

[project.urls]
Homepage = "https://github.com/saemeon/dash-fn-interact"
Repository = "https://github.com/saemeon/dash-fn-interact"

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
dash_interact = ["py.typed"]
